<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    
    <title>Portafolio</title>

</head>

<body>
    <header>
        <h1>PORTAFOLIO 01</h1>
        <p class="frase">registro de actividades</p>
    </header>

    <main>
        <section>
            <h2>Hola!</h2>

            <input type="text" id="nombreInput" placeholder="Ingrese su nombre aquí">
            <button onclick="guardarNombre()">Guardar</button>

            <p id="saludo"></p>
        </section>

        <section>
            <h2>Actividades</h2>
            <p>
                1. Crear mi primer portafolio con GitHub Pages.<br>
                2. Incluir menu de navegación.
                3. Hacer uso de GitHub Flow mediante el uso de Code Spaces y el manejo de branches, pull requests, code review y merge.
            </p>
        </section>

        <section>
            <h2>Proyectos</h2>
            <a href="pages/menu.html">
                Menu de navegación
            </a>
        </section>
    </main>

    <script>    
        function guardarNombre() {
            const nombre = document.getElementById("nombreInput").value.trim();

            if (nombre === "") {
                sessionStorage.removeItem("nombreUsuario");
                document.getElementById("saludo").innerText = "";
                return;
            }

            sessionStorage.setItem("nombreUsuario", nombre);
            mostrarSaludo();
        }

        function mostrarSaludo() {
            const nombre = sessionStorage.getItem("nombreUsuario");

            if (nombre) {
                document.getElementById("saludo").innerText =
                    "Bienvenido a mi sitio, " + nombre;

                document.getElementById("nombreInput").value = nombre;
            } else {
                document.getElementById("saludo").innerText = "";
            }
        }

        // Ejecutar al cargar
        window.onload = mostrarSaludo;
    </script>

</body>
</html>
